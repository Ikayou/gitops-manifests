apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-app
  namespace: argocd
spec:
  project: default
  source:
    
    repoURL: 'https://github.com/Ikayou/gitops-manifests.git'
    targetRevision: HEAD
    path: 'apps/backend/overlays/staging'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: staging # "kubectl create ns staging" - ns erstellen
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-app
  namespace: argocd
spec:
  project: default
  source:
    
    repoURL: 'https://github.com/Ikayou/gitops-manifests.git'
    targetRevision: HEAD
    path: 'apps/backend/overlays/production'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: production # "kubectl create ns production" - ns erstellen
  syncPolicy:
    automated:
      prune: true
      selfHeal: true