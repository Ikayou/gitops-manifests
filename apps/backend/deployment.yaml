apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-backend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-backend
  template:
    metadata:
      labels:
        app: python-backend
    spec:
      containers:
      - name: app
        image: acrabcreg2026test.azurecr.io/backend:latest 
        ports:
        - containerPort: 8000