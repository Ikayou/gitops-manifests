apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-backend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-backend
  template:
    metadata:
      labels:
        app: python-backend
    spec:
      containers:
      - name: app
        image: acrabcreg2026test.azurecr.io/backend:b84d5bd3fcf779eb6cb2eb6177da0d1a95c5c31f
        ports:
        - containerPort: 8000