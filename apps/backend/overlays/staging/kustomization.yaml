apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

namespace: staging
namePrefix: stg-
images:
- name: acrabcreg2026test.azurecr.io/backend
  newTag: aba694ca96b7456d1cf5843f8e06b4a20e99400c

patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/http/paths/0/path
      value: /staging
  target:
    kind: Ingress
    name: backend-ingress
